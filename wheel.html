<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо удачи 🎡</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        p.sub {
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: auto;
        }

        /* Стрелка */
        .pointer {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-right: 28px solid #fff;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
            z-index: 2;
        }

        #spinBtn {
            margin-top: 25px;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #3a9189;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            transition: transform .2s;
        }

        #spinBtn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        #spinBtn:disabled {
            opacity: .6;
            cursor: default;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: popIn 0.4s ease-out;
        }

        .modal img {
            width: 100%;
            max-width: 250px;
            margin: 0 auto 20px;
            border-radius: 12px;
            display: block;
        }

        .modal h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }

        .modal p {
            font-size: 20px;
            font-weight: 700;
            color: #3a9189;
        }

        .close-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #3a9189;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #2d7069;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            #spinBtn {
                width: 90%;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="logo.png" alt="Логотип" style="max-width: 150px; margin: 0 auto 20px; display: block;">
</div>

<h1>Испытайте удачу! 🎉</h1>

<div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="500" height="500"></canvas>
</div>

<button id="spinBtn">КРУТИТЬ</button>

<!-- Модальное окно -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <img id="modalImage" src="" alt="Дом">
        <h2>Поздравляем!</h2>
        <p id="modalPrize"></p>
        <button class="close-btn" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<!-- Зависимости -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/zarocknz/javascript-winwheel@2.7/Winwheel.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userPhone = urlParams.get('phone') || 'unknown';
    const phoneClean = userPhone.replace(/\D/g, '');

    if (userPhone === 'unknown' || phoneClean.length < 10) {
        document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;">
      <h2>⚠️ Ошибка</h2>
      <p style="margin-bottom:20px;">Сначала введите номер телефона на главной странице.</p>
    </div>`;
        throw new Error('Invalid phone');
    }

    // --- CONFIG ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6nkv-vvLM6bdxt-4-khKxsoVdLKuwudcYHALy8sDoXvinXxmFxgR4x2nmWMlsqRlL/exec';
    const prizes = [
        '160 000₽',
        '140 000₽',
        '70 000₽',
        '80 000₽',
        '110 000₽',
        '20 000₽',
        '90 000₽',
        '60 000₽',
        'Подписка',
        '50 000₽',
        '130 000₽',
        '100 000₽',
    ];
    const brandColors = [
        // '#2E4357', // Основной тёмный (бренд)
        '#3a9189', // Слегка светлее, но всё ещё тёмный
        '#4AB7AE', // Акцентный бирюзовый (бренд)
        '#5ABDB4', // Слегка светлее бирюзы
        '#88D0C8', // Средне-светлая бирюза
        '#A7DFD8', // Светлая, но не слишком (хорошо для текста)
        '#C7E8E2', // Очень светлая, но безопасная
        '#D6ECE7'  // Почти фоновая, но всё ещё с оттенком
    ];

    function getRandomColor(excludeColor) {
        let color;
        do {
            color = brandColors[Math.floor(Math.random() * brandColors.length)];
        } while (color === excludeColor);
        return color;
    }

    const colors = [];
    for (let i = 0; i < prizes.length; i++) {
        const prevColor = colors[i - 1] || null;
        colors.push(getRandomColor(prevColor));
    }

    // --- WHEEL INIT ---
    const wheel = new Winwheel({
        canvasId: 'wheelCanvas',
        numSegments: prizes.length,
        outerRadius: 220,
        innerRadius: 40,
        textFontSize: 15,
        textOrientation: 'horizontal',
        textAlignment: 'outer',
        pointerAngle: 90,
        segments: prizes.map((txt, i) => ({
            fillStyle: colors[i % colors.length],
            text: txt
        })),
        animation: {
            type: 'spinToStop',
            duration: 5,
            spins: 8,
            callbackFinished: onPrize,
            callbackSound: playTick,
            soundTrigger: 'pin'
        },
        pins: {
            number: prizes.length,
            fillStyle: '#ffffff',
            outerRadius: 6,
            margin: -5
        }
    });

    let tickSound = new Audio();

    function playTick() {
    }

    const btn = document.getElementById('spinBtn');
    const modal = document.getElementById('resultModal');
    const modalImg = document.getElementById('modalImage');
    const modalPrize = document.getElementById('modalPrize');

    btn.addEventListener('click', () => {
        btn.disabled = true;
        closeModal(); // на всякий случай
        wheel.stopAnimation(false);
        wheel.rotationAngle = -90;
        wheel.draw();
        wheel.startAnimation();
    });

    function onPrize(indicatedSegment) {
        let prize = indicatedSegment.text;
        if (prize.toLowerCase().includes("подписка")) {
            prize = "Подписка на 6 месяцев";
        } else {
            prize = `Скидка: ${prize}`;
        }

        // Выбираем случайную картинку
        const images = ['media/house_1.webp', 'media/house_2.webp'];
        const randomImage = images[Math.floor(Math.random() * images.length)];

        // Заполняем модалку
        modalImg.src = randomImage;
        modalPrize.textContent = prize;

        // Показываем модалку
        modal.style.display = 'flex';

        // Отправляем результат в Google Apps Script
        const body = new URLSearchParams({phone: userPhone, prize: prize});
        fetch(GAS_URL, {method: 'POST', body: body, mode: 'no-cors'})
            .catch(() => {});
    }

    function closeModal() {
        modal.style.display = 'none';
    }
</script>
</body>
</html>
